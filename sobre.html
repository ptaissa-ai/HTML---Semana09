<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOBRE - IFSP</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* Força o container principal do topo a ficar totalmente branco e remove fundos pretos */
    header#topo.topo, 
    header.topo, 
    #topo {
      background: #ffffff !important;
      background-color: #ffffff !important;
      width: 100% !important;
    }

    /* Força a barra de navegação interna a ficar idêntica ao padrão claro do index */
    nav.menu-superior,
    header .menu-superior,
    #topo .menu-superior {
      display: flex !important;
      justify-content: center !important; /* Centraliza os itens como no index */
      align-items: center !important;
      gap: 25px !important;
      padding: 20px 0 !important;
      background: #ffffff !important;
      background-color: #ffffff !important;
      border-bottom: 3px solid #006633 !important; /* Linha verde abaixo do menu */
    }

    /* Força a cor dos links para o verde escuro padrão do index */
    nav.menu-superior a,
    header .menu-superior a,
    #topo .menu-superior a {
      color: #004d26 !important; 
      background: none !important;
      background-color: transparent !important;
      text-decoration: none !important;
      font-weight: bold !important;
      font-size: 14px !important;
      text-transform: uppercase !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Efeito hover sutil nos links */
    nav.menu-superior a:hover {
      color: #00843d !important;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

    <a href="entrar.html">ENTRAR</a>

</footer>

<script type="text/babel">

function Sobre() {
  return (
    <div class="conteudo-institucional">
      {/* Faixa Verde com a logo.jpg grande */}
      <div class="banner-ifsp" style={{ backgroundColor: '#00843d', width: '100%', padding: '15px 0' }}>
        <div class="logo-container" style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 20px' }}>
          <img src="logo.jpg" alt="Instituto Federal São Paulo" style={{ display: 'block', height: 'auto', maxHeight: '90px' }} />
        </div>
      </div>

      {/* Texto Institucional oficial */}
      <div class="texto-sobre" style={{ maxWidth: '1200px', margin: '30px auto', padding: '0 20px', fontSize: '15px', lineHeight: '1.6', color: '#333333' }}>
        <p>
          O <strong>Instituto Federal de Educação, Ciência e Tecnologia de São Paulo</strong> – é uma autarquia federal de ensino.
        </p>

        <p>
          Fundada em 1909, como Escola de Aprendizes Artífices, é reconhecida pela sociedade paulista por sua excelência no ensino público gratuito de qualidade.
        </p>

        <p>
          Durante sua história, recebeu, também, os nomes de Escola Técnica Federal de São Paulo e Centro Federal de Educação Tecnológica de São Paulo. Com a transformação em Instituto, em dezembro de 2008, passou a ter relevância de universidade, destacando-se pela autonomia.
        </p>

        <p>
          Com a mudança, o Instituto Federal de São Paulo passou a destinar 50% das vagas para os cursos técnicos e, no mínimo, 20% das vagas para os cursos de licenciatura, sobretudo nas áreas de Ciências e da Matemática. Complementarmente, continuará oferecendo cursos de formação inicial e continuada, tecnologias, engenharias e pós-graduação.
        </p>

        <p>
          Além dos cursos presenciais, o Instituto Federal de São Paulo oferece os cursos Técnicos em Administração e em Informática para Internet e, a partir de 2012, o superior de Formação de Professores na modalidade de Ensino a Distância (EaD).
        </p>

        <p>
          O IFSP é organizado em diversos câmpus e possui mais de 40 mil alunos matriculados nas 36 unidades distribuídas pelo estado de São Paulo.;
        </p>

        <p>
          Localizado na <strong>Rua Pedro Vicente, 625 - Canindé - São Paulo - SP - Brasil - Cep: 01109-010</strong>
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(
  document.getElementById('sobre-react')
);

root.render(<Sobre />);

</script>
