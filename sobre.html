<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOBRE - IFSP</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* Remove qualquer fundo escuro do cabeçalho */
    header.topo {
      background-color: #ffffff !important;
      width: 100%;
    }

    /* Menu Superior idêntico ao da imagem index (Limpo e Claro) */
    .menu-superior {
      display: flex;
      justify-content: center; /* Centraliza os links na tela */
      align-items: center;
      gap: 30px; /* Espaço ideal entre as opções */
      padding: 20px 0;
      background-color: #ffffff !important; /* Força o fundo branco */
      border-bottom: 3px solid #006633; /* Linha verde idêntica abaixo do menu */
    }

    .menu-superior a {
      color: #004d26 !important; /* Cor exata do texto em verde escuro */
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu-superior a:hover {
      color: #00843d !important;
    }

    /* Faixa Verde Grande do Instituto Federal */
    .banner-ifsp {
      background-color: #00843d; 
      width: 100%;
      padding: 15px 0;
      display: flex;
      align-items: center;
    }

    /* Container para alinhar a logo grande */
    .logo-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo-ifsp {
      display: block;
      height: auto;
      max-height: 90px; 
    }

    /* Configuração do Corpo do Texto */
    .texto-sobre {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #333333;
    }

    .texto-sobre p {
      margin-bottom: 20px;
    }

    /* Rodapé e Redes Sociais */
    .rodape-icones {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .icone-facebook {
      width: 40px;
      height: auto;
    }

    .rodape-site {
      max-width: 1200px;
      margin: 30px auto 20px auto;
      padding: 0 20px;
      font-size: 13px;
      color: #333333;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

<header id="topo" class="topo">
  <nav class="menu-superior">
    <a href="index.html">INÍCIO</a>
    <a href="contato.html">CONTATO</a>
    <a href="cursos.html">CURSOS</a>
    <a href="eventos.html">EVENTOS</a>
    <a href="sobre.html">SOBRE</a>
    <a href="inscricao.html">INSCRIÇÃO</a>
    <a href="entrar.html">ENTRAR</a>
  </nav>
</header>

<main class="pagina">

  <div id="sobre-react" class="secao"></div>

  <section class="secao rodape-icones">
    <a href="https://www.facebook.com/ifsppirituba" target="_blank">
      <img src="facebook.png" alt="Facebook" class="icone-facebook">
    </a>
  </section>

</main>

<footer class="rodape-site">
  <p>IFSP - Câmpus Pirituba - Av. Mutinga, 951 - Jardim Santo Elias - CEP: 05110-000 - São Paulo/SP - Contato: (011) 2504-0100</p>
</footer>

<script type="text/babel">

function Sobre() {
  return (
    <div class="conteudo-institucional">
      {/* Banner Verde com a logo.jpg */}
      <div class="banner-ifsp">
        <div class="logo-container">
          <img src="logo.jpg" alt="Instituto Federal São Paulo" class="logo-ifsp" />
        </div>
      </div>

      {/* Texto institucional da tela */}
      <div class="texto-sobre">
        <p>
          O <strong>Instituto Federal de Educação, Ciência e Tecnologia de São Paulo</strong> – é uma autarquia federal de ensino.
        </p>

        <p>
          Fundada em 1909, como Escola de Aprendizes Artífices, é reconhecida pela sociedade paulista por sua excelência no ensino público gratuito de qualidade.
        </p>

        <p>
          Durante sua história, recebeu, também, os nomes de Escola Técnica Federal de São Paulo e Centro Federal de Educação Tecnológica de São Paulo. Com a transformação em Instituto, em dezembro de 2008, passou a ter relevância de universidade, destacando-se pela autonomia.
        </p>

        <p>
          Com a mudança, o Instituto Federal de São Paulo passou a destinar 50% das vagas para os cursos técnicos e, no mínimo, 20% das vagas para os cursos de licenciatura, sobretudo nas áreas de Ciências e da Matemática. Complementarmente, continuará oferecendo cursos de formação inicial e continuada, tecnologias, engenharias e pós-graduação.
        </p>

        <p>
          Além dos cursos presenciais, o Instituto Federal de São Paulo oferece os cursos Técnicos em Administração e em Informática para Internet e, a partir de 2012, o superior de Formação de Professores na modalidade de Ensino a Distância (EaD).
        </p>

        <p>
          O IFSP é organized em diversos câmpus e possui mais de 40 mil alunos matriculados nas 36 unidades distribuídas pelo estado de São Paulo.;
        </p>

        <p>
          Localizado na <strong>Rua Pedro Vicente, 625 - Canindé - São Paulo - SP - Brasil - Cep: 01109-010</strong>
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(
  document.getElementById('sobre-react')
);

root.render(<Sobre />);

</script>

</body>
</html>
